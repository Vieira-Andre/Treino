<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Treino">
<title>Diário de Treino</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeecea;
    --text: #1a1a18;
    --text2: #6b6a65;
    --text3: #9b9a94;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --blue: #378ADD;
    --blue-bg: #E6F1FB;
    --blue-text: #0C447C;
    --green: #3B6D11;
    --green-bg: #EAF3DE;
    --amber: #633806;
    --amber-bg: #FAEEDA;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --radius: 10px;
    --radius-sm: 7px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #e8e6df;
      --text2: #9b9a94;
      --text3: #6b6a65;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --blue-bg: #042C53;
      --blue-text: #85B7EB;
      --green-bg: #173404;
      --green: #97C459;
      --amber-bg: #412402;
      --amber: #EF9F27;
      --red-bg: #501313;
      --red: #F09595;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; background: var(--bg); min-height: 100vh; }

  /* Header */
  .header { padding: 52px 16px 0; background: var(--bg); border-bottom: 0.5px solid var(--border); }
  .header h1 { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
  .header p { font-size: 13px; color: var(--text2); margin-bottom: 14px; }
  .tab-bar { display: flex; gap: 4px; }
  .tab { flex: 1; padding: 9px; border: none; background: transparent; color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* Content */
  .content { padding: 16px; }
  .section { display: none; }
  .section.active { display: block; }

  /* Cards */
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }

  /* Form elements */
  label.field-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); margin-bottom: 6px; }
  select, input[type=number], input[type=text], textarea {
    width: 100%; font-size: 15px; padding: 10px 12px;
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--bg2); color: var(--text); outline: none;
    -webkit-appearance: none; appearance: none;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
  textarea { resize: vertical; min-height: 70px; line-height: 1.5; }

  /* Buttons */
  button { font-family: inherit; cursor: pointer; transition: all 0.15s; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; font-size: 14px; font-weight: 500; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-primary:hover { opacity: 0.9; }
  .btn-full { width: 100%; justify-content: center; padding: 13px; font-size: 15px; }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .btn-danger { color: var(--red); border-color: transparent; background: transparent; }
  .btn-danger:hover { background: var(--red-bg); }
  .btn-success { background: var(--green-bg); color: var(--green); border-color: transparent; }
  .btn-export { background: var(--green-bg); color: var(--green); border-color: transparent; }

  /* Series grid */
  .series-header, .serie-row { display: grid; grid-template-columns: 26px 1fr 1fr 1fr 36px; gap: 6px; align-items: center; }
  .series-header { margin-bottom: 8px; }
  .series-header span { font-size: 11px; color: var(--text3); text-align: center; font-weight: 500; }
  .serie-num { font-size: 12px; color: var(--text3); text-align: center; font-weight: 600; }
  .serie-row { margin-bottom: 6px; }
  .serie-row input { text-align: center; padding: 8px 4px; font-size: 14px; }
  #series-container { margin-bottom: 8px; }

  /* Badges / pills */
  .pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .pill-blue { background: var(--blue-bg); color: var(--blue-text); }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .pill-red { background: var(--red-bg); color: var(--red); }

  /* Toast */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; transition: transform 0.3s; z-index: 100; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* History */
  .hist-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .hist-card-header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; }
  .hist-card-header:hover { background: var(--bg2); }
  .hist-card-body { display: none; padding: 0 14px 12px; }
  .hist-card-body.open { display: block; }
  .hist-session { padding: 8px 0; border-top: 0.5px solid var(--border); }
  .hist-session:first-child { border-top: none; }
  .ev-bar-wrap { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin: 6px 0 10px; }
  .ev-bar { height: 100%; background: var(--blue); border-radius: 2px; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 24px; color: var(--text2); }
  .empty svg { margin-bottom: 12px; opacity: 0.3; }

  /* Filters */
  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .filter-row select { flex: 1; font-size: 13px; padding: 8px 10px; }
  .actions-row { display: flex; gap: 8px; margin-bottom: 14px; }

  /* Divider */
  .divider { height: 0.5px; background: var(--border); margin: 12px 0; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .stat-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 10px 12px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 600; }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* Add serie btn */
  .add-serie-row { display: flex; justify-content: flex-end; margin-bottom: 10px; }

  /* Chevron */
  .chevron { transition: transform 0.2s; font-size: 11px; color: var(--text3); }
  .chevron.open { transform: rotate(180deg); }

  /* Message saved */
  .msg-saved { display: none; text-align: center; font-size: 13px; color: var(--green); background: var(--green-bg); border-radius: var(--radius-sm); padding: 8px; margin-top: 10px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Diário de Treino</h1>
    <p>Registre cargas e acompanhe sua evolução</p>
    <div class="tab-bar">
      <button class="tab active" onclick="showTab('registrar',this)">Registrar</button>
      <button class="tab" onclick="showTab('historico',this)">Histórico</button>
      <button class="tab" onclick="showTab('stats',this)">Evolução</button>
    </div>
  </div>

  <div class="content">

    <!-- REGISTRAR -->
    <div id="sec-registrar" class="section active">
      <div class="card">
        <label class="field-label">Dia do treino</label>
        <select id="sel-dia" onchange="loadExercicios()">
          <option value="">— selecione o dia —</option>
          <option value="Segunda">Segunda — Push (Peito · Ombro · Tríceps)</option>
          <option value="Terça">Terça — Pull (Costas · Bíceps · Trapézio)</option>
          <option value="Quarta">Quarta — Pernas quad-dominante</option>
          <option value="Sexta">Sexta — Full Upper</option>
          <option value="Sábado">Sábado — Pernas post-dominante</option>
        </select>
      </div>

      <div id="ex-section" style="display:none">
        <div class="card">
          <label class="field-label">Exercício</label>
          <select id="sel-ex"></select>
        </div>

        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <label class="field-label" style="margin:0">Séries</label>
            <button class="btn btn-sm" onclick="addSerie()">+ série</button>
          </div>
          <div class="series-header">
            <span></span>
            <span>kg</span>
            <span>reps</span>
            <span>RPE</span>
            <span></span>
          </div>
          <div id="series-container"></div>
        </div>

        <div class="card">
          <label class="field-label">Observações</label>
          <textarea id="obs-input" placeholder="Sensações, forma, notas..."></textarea>
        </div>

        <button class="btn btn-primary btn-full" onclick="salvarSessao()">✓ Salvar sessão</button>
        <div class="msg-saved" id="msg-salvo">Sessão salva com sucesso!</div>
      </div>
    </div>

    <!-- HISTÓRICO -->
    <div id="sec-historico" class="section">
      <div class="filter-row">
        <select id="hist-dia" onchange="renderHistorico()">
          <option value="">Todos os dias</option>
          <option value="Segunda">Segunda</option>
          <option value="Terça">Terça</option>
          <option value="Quarta">Quarta</option>
          <option value="Sexta">Sexta</option>
          <option value="Sábado">Sábado</option>
        </select>
      </div>
      <div class="actions-row">
        <button class="btn btn-export" onclick="exportCSV()" style="flex:1;justify-content:center">⬇ Exportar CSV</button>
        <button class="btn btn-danger btn-sm" onclick="confirmarLimpar()">Limpar dados</button>
      </div>
      <div id="hist-content"></div>
    </div>

    <!-- EVOLUÇÃO -->
    <div id="sec-stats" class="section">
      <div class="card">
        <label class="field-label">Exercício para análise</label>
        <select id="ev-ex" onchange="renderEvolucao()">
          <option value="">— selecione —</option>
        </select>
      </div>
      <div id="ev-content"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const DIAS = {
  "Segunda": ["Supino reto com halteres","Supino inclinado com halteres","Crossover / peck deck","Desenvolvimento com halteres","Elevação lateral com halteres","Tríceps testa barra W (EZ)","Pushdown no cabo (corda)"],
  "Terça":   ["Remada curvada com halteres","Puxada frente (pegada aberta)","Puxada frente (triângulo)","Crucifixo inverso / peck deck inv.","Rosca direta barra W (EZ)","Rosca martelo com halteres","Encolhimento com halteres"],
  "Quarta":  ["Agachamento livre","Leg press 45°","Extensora","Stiff com halteres","Flexora deitada","Gêmeos em pé"],
  "Sexta":   ["Remada unilateral com halter","Pullover no cabo / halter","Supino declinado com halteres","Crucifixo com halteres","Elevação lateral no cabo","Elevação frontal com halteres","Rosca concentrada / spider curl","Tríceps francês com halter (overhead)"],
  "Sábado":  ["Terra romeno com halteres","Flexora sentada","Nordic curl / flexora unilateral","Hack squat / agach. búlgaro","Avanço (lunge) com halteres","Hip thrust com barra","Gêmeos em pé"]
};

let db = [];
let serieCount = 0;

function loadDB() {
  try { db = JSON.parse(localStorage.getItem('treino-db') || '[]'); } catch(e) { db = []; }
}
function saveDB() {
  localStorage.setItem('treino-db', JSON.stringify(db));
}

function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function showTab(name, el) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='historico') renderHistorico();
  if(name==='stats') { populateEvSelect(); renderEvolucao(); }
}

function loadExercicios() {
  const dia = document.getElementById('sel-dia').value;
  const sec = document.getElementById('ex-section');
  if(!dia){sec.style.display='none';return;}
  sec.style.display='block';
  const sel = document.getElementById('sel-ex');
  sel.innerHTML = DIAS[dia].map(e=>`<option>${e}</option>`).join('');
  serieCount=0;
  document.getElementById('series-container').innerHTML='';
  addSerie(); addSerie(); addSerie();
  document.getElementById('obs-input').value='';
  document.getElementById('msg-salvo').style.display='none';
}

function addSerie() {
  serieCount++;
  const n = serieCount;
  const c = document.getElementById('series-container');
  const row = document.createElement('div');
  row.className='serie-row';
  row.id=`serie-${n}`;
  row.innerHTML=`
    <div class="serie-num">${n}</div>
    <input type="number" id="kg-${n}" placeholder="0" min="0" step="0.5">
    <input type="number" id="reps-${n}" placeholder="0" min="0" step="1">
    <input type="number" id="rpe-${n}" placeholder="—" min="1" max="10" step="0.5">
    <button class="btn-danger btn" style="padding:4px 6px;font-size:13px;border:none" onclick="removeSerie(${n})" title="Remover">✕</button>`;
  c.appendChild(row);
}

function removeSerie(n) {
  const el=document.getElementById(`serie-${n}`);
  if(el) el.remove();
}

function salvarSessao() {
  const dia=document.getElementById('sel-dia').value;
  const ex=document.getElementById('sel-ex').value;
  if(!dia||!ex){toast('Selecione o dia e o exercício');return;}
  const series=[];
  document.querySelectorAll('#series-container .serie-row').forEach(row=>{
    const id=row.id.replace('serie-','');
    const kg=parseFloat(document.getElementById(`kg-${id}`)?.value)||0;
    const reps=parseInt(document.getElementById(`reps-${id}`)?.value)||0;
    const rpe=parseFloat(document.getElementById(`rpe-${id}`)?.value)||null;
    if(kg>0||reps>0) series.push({kg,reps,rpe});
  });
  if(!series.length){toast('Adicione pelo menos uma série com dados');return;}
  const obs=document.getElementById('obs-input').value.trim();
  const now=new Date();
  db.push({
    dia, ex, series, obs,
    data: now.toLocaleDateString('pt-BR'),
    hora: now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    ts: now.getTime()
  });
  saveDB();
  const msg=document.getElementById('msg-salvo');
  msg.style.display='block';
  toast('Sessão salva!');
  setTimeout(()=>msg.style.display='none',3000);
}

function renderHistorico() {
  const filtro=document.getElementById('hist-dia').value;
  const cont=document.getElementById('hist-content');
  let dados=[...db].reverse();
  if(filtro) dados=dados.filter(d=>d.dia===filtro);
  if(!dados.length){
    cont.innerHTML='<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg><p>Nenhuma sessão registrada ainda.</p></div>';
    return;
  }
  const grouped={};
  dados.forEach(d=>{
    const key=`${d.dia}|||${d.ex}`;
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(d);
  });
  let html='';
  Object.entries(grouped).forEach(([key,sessions])=>{
    const [dia,ex]=key.split('|||');
    const allKgs=sessions.flatMap(s=>s.series.map(r=>r.kg)).filter(k=>k>0);
    const maxKg=allKgs.length?Math.max(...allKgs):0;
    const lastSess=sessions[0];
    const lastKg=lastSess.series.filter(r=>r.kg>0).length?Math.max(...lastSess.series.map(r=>r.kg)):0;
    const prevKg=sessions.length>1&&sessions[1].series.filter(r=>r.kg>0).length?Math.max(...sessions[1].series.map(r=>r.kg)):null;
    let trend='';
    if(prevKg!==null&&lastKg>0){
      if(lastKg>prevKg) trend=`<span class="pill pill-green">▲ +${(lastKg-prevKg).toFixed(1)}kg</span>`;
      else if(lastKg<prevKg) trend=`<span class="pill pill-amber">▼ -${(prevKg-lastKg).toFixed(1)}kg</span>`;
    }
    const uid=`hist-${key.replace(/[^a-z0-9]/gi,'_')}`;
    html+=`<div class="hist-card">
      <div class="hist-card-header" onclick="toggleHist('${uid}')">
        <div>
          <div style="font-size:14px;font-weight:500;margin-bottom:2px">${ex}</div>
          <div style="font-size:12px;color:var(--text2)"><span class="pill pill-blue">${dia}</span> &nbsp;${sessions.length} sess${sessions.length>1?'ões':'ão'}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:15px;font-weight:600">${lastKg>0?lastKg.toFixed(1)+' kg':'—'} ${trend}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">último treino</div>
          <div class="chevron" id="chev-${uid}">▼</div>
        </div>
      </div>
      <div class="hist-card-body" id="${uid}">
        ${maxKg>0?`<div style="padding:0 14px 4px"><div class="ev-bar-wrap"><div class="ev-bar" style="width:${lastKg>0?Math.round((lastKg/maxKg)*100):0}%"></div></div></div>`:''}`;
    sessions.forEach(s=>{
      const seriesStr=s.series.map((r,i)=>`S${i+1}: ${r.kg}kg×${r.reps}${r.rpe?' RPE'+r.rpe:''}`).join(' &nbsp;·&nbsp; ');
      const totalVol=s.series.reduce((acc,r)=>acc+(r.kg*r.reps),0);
      html+=`<div class="hist-session">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;font-weight:500">${s.data} ${s.hora}</span>
          ${totalVol>0?`<span style="font-size:12px;color:var(--text2)">Vol: ${totalVol.toLocaleString('pt-BR')} kg</span>`:''}
        </div>
        <div style="font-size:12px;color:var(--text2);line-height:1.7">${seriesStr||'—'}</div>
        ${s.obs?`<div style="font-size:12px;color:var(--text3);margin-top:3px;font-style:italic">${s.obs}</div>`:''}
      </div>`;
    });
    html+='</div></div>';
  });
  cont.innerHTML=html;
}

function toggleHist(uid) {
  const body=document.getElementById(uid);
  const chev=document.getElementById('chev-'+uid);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function populateEvSelect() {
  const allEx=[...new Set(db.map(d=>d.ex))].sort();
  const sel=document.getElementById('ev-ex');
  const cur=sel.value;
  sel.innerHTML='<option value="">— selecione —</option>'+allEx.map(e=>`<option${e===cur?' selected':''}>${e}</option>`).join('');
}

function renderEvolucao() {
  const ex=document.getElementById('ev-ex').value;
  const cont=document.getElementById('ev-content');
  if(!ex){cont.innerHTML='';return;}
  const sessions=db.filter(d=>d.ex===ex).sort((a,b)=>a.ts-b.ts);
  if(!sessions.length){cont.innerHTML='<div class="empty"><p>Sem dados para este exercício.</p></div>';return;}
  const maxKgs=sessions.map(s=>s.series.filter(r=>r.kg>0).length?Math.max(...s.series.map(r=>r.kg)):0);
  const totalVols=sessions.map(s=>s.series.reduce((a,r)=>a+(r.kg*r.reps),0));
  const globalMax=Math.max(...maxKgs)||1;
  const totalSessoes=sessions.length;
  const pr=Math.max(...maxKgs).toFixed(1);
  const ultima=sessions[sessions.length-1];
  const ultimaKg=maxKgs[maxKgs.length-1];
  let html=`<div class="stats-row">
    <div class="stat-card"><div class="stat-val">${totalSessoes}</div><div class="stat-lbl">sessões</div></div>
    <div class="stat-card"><div class="stat-val">${pr}</div><div class="stat-lbl">PR (kg)</div></div>
    <div class="stat-card"><div class="stat-val">${ultimaKg>0?ultimaKg.toFixed(1):'—'}</div><div class="stat-lbl">último</div></div>
  </div>
  <div class="card">
    <label class="field-label">Carga máxima por sessão</label>
    <div style="margin-top:8px">`;
  sessions.forEach((s,i)=>{
    const kg=maxKgs[i];
    const pct=globalMax>0?Math.round((kg/globalMax)*100):0;
    html+=`<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
        <span style="color:var(--text2)">${s.data}</span>
        <span style="font-weight:500">${kg>0?kg.toFixed(1)+' kg':'—'}</span>
      </div>
      <div class="ev-bar-wrap"><div class="ev-bar" style="width:${pct}%"></div></div>
    </div>`;
  });
  html+='</div></div>';
  if(totalVols.some(v=>v>0)){
    html+=`<div class="card"><label class="field-label">Volume total por sessão (kg·reps)</label><div style="margin-top:8px">`;
    const maxVol=Math.max(...totalVols)||1;
    sessions.forEach((s,i)=>{
      const vol=totalVols[i];
      const pct=Math.round((vol/maxVol)*100);
      html+=`<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
          <span style="color:var(--text2)">${s.data}</span>
          <span style="font-weight:500">${vol>0?vol.toLocaleString('pt-BR')+' kg':'—'}</span>
        </div>
        <div class="ev-bar-wrap"><div class="ev-bar" style="width:${pct}%;background:#1D9E75"></div></div>
      </div>`;
    });
    html+='</div></div>';
  }
  cont.innerHTML=html;
}

function exportCSV() {
  if(!db.length){toast('Nenhum dado para exportar');return;}
  const rows=[['Data','Hora','Dia','Exercício','Série','Carga (kg)','Reps','RPE','Observações','Volume (kg·reps)']];
  db.forEach(s=>{
    s.series.forEach((r,i)=>{
      rows.push([
        s.data, s.hora, s.dia, s.ex,
        i+1, r.kg||0, r.reps||0, r.rpe||'',
        i===0?(s.obs||''):'',
        r.kg&&r.reps?(r.kg*r.reps).toFixed(1):0
      ]);
    });
  });
  const csv='\uFEFF'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const now=new Date();
  a.href=url;
  a.download=`treino_${now.toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV exportado!');
}

function confirmarLimpar() {
  if(confirm('Apagar todos os dados de treino? Esta ação não pode ser desfeita.')) {
    db=[];
    saveDB();
    renderHistorico();
    toast('Dados apagados.');
  }
}

loadDB();
